<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yatham Prasad Reddy — Data Analyst</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #00e5b0;
    --accent2: #6c63ff;
    --accent3: #ff6b6b;
    --text: #e8e8f0;
    --muted: #7070a0;
    --glow: rgba(0,229,176,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
  }
  .cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: all 0.18s ease;
    opacity: 0.5;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,229,176,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,176,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 500;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 3rem;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-decoration: none;
  }
  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent); }

  /* SECTIONS */
  section { position: relative; z-index: 1; }

  /* HERO */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8rem 3rem 4rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 0.3rem 0.8rem;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.2s forwards;
  }
  .hero-tag::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.4); }
  }

  .hero-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(3rem, 8vw, 7rem);
    line-height: 0.95;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.4s forwards;
  }
  .hero-name .line2 {
    color: transparent;
    -webkit-text-stroke: 1.5px var(--accent);
  }

  .hero-desc {
    font-size: 0.9rem;
    color: var(--muted);
    max-width: 520px;
    line-height: 1.8;
    margin: 1.5rem 0 2.5rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.6s forwards;
  }

  .hero-ctas {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.8s forwards;
  }

  .btn {
    padding: 0.75rem 1.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-block;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border: 1px solid var(--accent);
  }
  .btn-primary:hover {
    background: transparent;
    color: var(--accent);
    box-shadow: 0 0 24px var(--glow);
  }
  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .hero-stats {
    display: flex;
    gap: 3rem;
    margin-top: 4rem;
    padding-top: 2.5rem;
    border-top: 1px solid var(--border);
    opacity: 0;
    animation: fadeUp 0.8s ease 1s forwards;
  }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
  }
  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.2rem;
  }

  /* SCROLL INDICATOR */
  .scroll-hint {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    color: var(--muted);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 1s ease 1.5s forwards;
  }
  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--accent), transparent);
    animation: scrollPulse 2s ease infinite;
  }
  @keyframes scrollPulse {
    0% { transform: scaleY(0); transform-origin: top; opacity: 0; }
    50% { transform: scaleY(1); opacity: 1; }
    100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
  }

  /* SECTION WRAPPER */
  .section-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 6rem 3rem;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    margin-bottom: 3.5rem;
  }
  .section-num {
    font-size: 0.72rem;
    color: var(--accent);
    letter-spacing: 0.2em;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    letter-spacing: -0.01em;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
    max-width: 200px;
  }

  /* SKILLS */
  #skills { background: var(--surface); }

  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5px;
    border: 1.5px solid var(--border);
  }
  .skill-cell {
    background: var(--card);
    padding: 2rem;
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
  }
  .skill-cell:hover { background: #1c1c2a; }
  .skill-cell::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 2px;
    background: var(--accent);
    transition: width 0.4s ease;
  }
  .skill-cell:hover::after { width: 100%; }

  .skill-cat {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
  }
  .skill-items {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .skill-tag {
    background: rgba(0,229,176,0.07);
    border: 1px solid rgba(0,229,176,0.2);
    color: var(--text);
    padding: 0.3rem 0.7rem;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .skill-tag:hover {
    background: rgba(0,229,176,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* EXPERIENCE */
  .exp-card {
    border: 1px solid var(--border);
    background: var(--card);
    padding: 2.5rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .exp-card:hover { border-color: var(--accent); }
  .exp-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(to bottom, var(--accent), var(--accent2));
  }
  .exp-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .exp-role {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
  }
  .exp-company {
    color: var(--accent);
    font-size: 0.8rem;
    margin-top: 0.2rem;
  }
  .exp-date {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    border: 1px solid var(--border);
    padding: 0.25rem 0.75rem;
    white-space: nowrap;
  }
  .exp-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .exp-list li {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.7;
    padding-left: 1.2rem;
    position: relative;
  }
  .exp-list li::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--accent);
  }
  .tech-stack {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }
  .tech-badge {
    font-size: 0.68rem;
    padding: 0.2rem 0.6rem;
    background: rgba(108,99,255,0.1);
    border: 1px solid rgba(108,99,255,0.3);
    color: #9b94ff;
    letter-spacing: 0.05em;
  }

  /* PROJECTS */
  #projects { background: var(--surface); }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 1px;
    background: var(--border);
  }
  .project-card {
    background: var(--card);
    padding: 2.5rem;
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
    display: flex;
    flex-direction: column;
  }
  .project-card:hover { background: #1a1a26; }
  .project-num {
    font-size: 4rem;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    color: rgba(0,229,176,0.07);
    position: absolute;
    top: 1rem; right: 1.5rem;
    line-height: 1;
  }
  .project-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    line-height: 1.3;
  }
  .project-desc {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.7;
    flex: 1;
    margin-top: 0.75rem;
  }
  .project-tech {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 1.5rem;
  }
  .proj-tag {
    font-size: 0.65rem;
    padding: 0.2rem 0.5rem;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .project-highlight {
    font-size: 0.72rem;
    color: var(--accent);
    margin-top: 1rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .project-highlight::before { content: '→'; }

  /* EDUCATION */
  .edu-card {
    display: flex;
    gap: 3rem;
    align-items: flex-start;
    border: 1px solid var(--border);
    padding: 2.5rem;
    background: var(--card);
    flex-wrap: wrap;
  }
  .edu-year {
    font-family: 'Syne', sans-serif;
    font-size: 2.5rem;
    font-weight: 800;
    color: transparent;
    -webkit-text-stroke: 1px var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .edu-details {}
  .edu-degree {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
  }
  .edu-inst {
    color: var(--accent);
    font-size: 0.8rem;
  }
  .edu-meta {
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 0.5rem;
  }

  /* CONTACT */
  #contact {
    background: var(--bg);
    text-align: center;
  }
  .contact-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 800;
    line-height: 1;
    margin-bottom: 1.5rem;
    background: linear-gradient(135deg, var(--text) 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .contact-sub {
    color: var(--muted);
    font-size: 0.85rem;
    max-width: 400px;
    margin: 0 auto 2.5rem;
    line-height: 1.8;
  }
  .contact-links {
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin-top: 2rem;
  }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.75rem 1.5rem;
    border: 1px solid var(--border);
    color: var(--muted);
    text-decoration: none;
    font-size: 0.75rem;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .contact-item:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 20px var(--glow);
  }
  .contact-item span { font-size: 1rem; }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  footer p { color: var(--muted); font-size: 0.7rem; letter-spacing: 0.1em; }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* HIGHLIGHT BAR */
  .highlight-bar {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    height: 2px;
    width: 60px;
    margin: 1rem 0 0;
  }

  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { display: none; }
    .section-wrap { padding: 4rem 1.5rem; }
    #hero { padding: 7rem 1.5rem 3rem; }
    .hero-stats { gap: 1.5rem; flex-wrap: wrap; }
    .exp-header { flex-direction: column; }
    .projects-grid { grid-template-columns: 1fr; }
    footer { flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- NAV -->
<nav>
  <a href="#hero" class="nav-logo">YPR_</a>
  <ul class="nav-links">
    <li><a href="#skills">Skills</a></li>
    <li><a href="#experience">Experience</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#education">Education</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-tag">Available for opportunities</div>
  <h1 class="hero-name">
    YATHAM<br>
    <span class="line2">PRASAD REDDY</span>
  </h1>
  <p class="hero-desc">
    Entry-level Data Analyst with a B.Tech in Artificial Intelligence & Data Science. Skilled in Python, SQL, Power BI, and Excel — building KPI dashboards, automating data workflows, and translating product requirements into scalable analytics frameworks.
  </p>
  <div class="hero-ctas">
    <a href="mailto:yathamprasadreddy@gmail.com" class="btn btn-primary">Get in Touch</a>
    <a href="#projects" class="btn btn-ghost">View Projects</a>
  </div>
  <div class="hero-stats">
    <div>
      <div class="stat-num">4</div>
      <div class="stat-label">Projects</div>
    </div>
    <div>
      <div class="stat-num">4+</div>
      <div class="stat-label">Tools & Techs</div>
    </div>
    <div>
      <div class="stat-num">2025</div>
      <div class="stat-label">Graduate</div>
    </div>
  </div>
  <div class="scroll-hint">
    <div class="scroll-line"></div>
    scroll
  </div>
</section>

<!-- SKILLS -->
<section id="skills">
  <div class="section-wrap">
    <div class="section-header reveal">
      <span class="section-num">01</span>
      <h2 class="section-title">Skills</h2>
      <div class="section-line"></div>
    </div>
    <div class="skills-grid reveal">
      <div class="skill-cell">
        <div class="skill-cat">Programming</div>
        <div class="skill-items">
          <span class="skill-tag">Python</span>
          <span class="skill-tag">SQL</span>
        </div>
      </div>
      <div class="skill-cell">
        <div class="skill-cat">Data Analysis</div>
        <div class="skill-items">
          <span class="skill-tag">Pandas</span>
          <span class="skill-tag">NumPy</span>
          <span class="skill-tag">Data Cleaning</span>
          <span class="skill-tag">EDA</span>
          <span class="skill-tag">Data Wrangling</span>
        </div>
      </div>
      <div class="skill-cell">
        <div class="skill-cat">Databases</div>
        <div class="skill-items">
          <span class="skill-tag">MySQL</span>
          <span class="skill-tag">PostgreSQL</span>
        </div>
      </div>
      <div class="skill-cell">
        <div class="skill-cat">Tools & Platforms</div>
        <div class="skill-items">
          <span class="skill-tag">Power BI</span>
          <span class="skill-tag">Excel</span>
          <span class="skill-tag">Jupyter Notebook</span>
          <span class="skill-tag">Git / GitHub</span>
          <span class="skill-tag">VS Code</span>
        </div>
      </div>
      <div class="skill-cell">
        <div class="skill-cat">Statistics</div>
        <div class="skill-items">
          <span class="skill-tag">Descriptive Statistics</span>
          <span class="skill-tag">Probability</span>
          <span class="skill-tag">Hypothesis Testing</span>
          <span class="skill-tag">A/B Testing</span>
        </div>
      </div>
      <div class="skill-cell">
        <div class="skill-cat">Visualization</div>
        <div class="skill-items">
          <span class="skill-tag">Matplotlib</span>
          <span class="skill-tag">Seaborn</span>
          <span class="skill-tag">Plotly</span>
          <span class="skill-tag">Dash</span>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- EXPERIENCE -->
<section id="experience">
  <div class="section-wrap">
    <div class="section-header reveal">
      <span class="section-num">02</span>
      <h2 class="section-title">Experience</h2>
      <div class="section-line"></div>
    </div>
    <div class="exp-card reveal">
      <div class="exp-header">
        <div>
          <div class="exp-role">Data Analyst Intern</div>
          <div class="exp-company">Teckybot</div>
        </div>
        <div class="exp-date">Jan 2025 — Apr 2025</div>
      </div>
      <ul class="exp-list">
        <li>Collected and preprocessed real estate datasets, handling missing values, outliers, and data cleaning using Python (Pandas, NumPy).</li>
        <li>Performed Exploratory Data Analysis (EDA) to identify key features influencing house prices such as location, area, and amenities.</li>
        <li>Built and evaluated machine learning models (Linear Regression, Random Forest) to predict house prices with optimized accuracy.</li>
        <li>Visualized data trends and model insights using Matplotlib, Seaborn, and Power BI / Tableau dashboards.</li>
      </ul>
      <div class="tech-stack">
        <span class="tech-badge">Python</span>
        <span class="tech-badge">Machine Learning</span>
        <span class="tech-badge">Excel</span>
        <span class="tech-badge">Git & GitHub</span>
        <span class="tech-badge">VS Code</span>
      </div>
    </div>
  </div>
</section>

